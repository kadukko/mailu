x-mailu-env: &mailu-env
  - SECRET_KEY=${SECRET_KEY:-changeMe}
  - DOMAIN=${DOMAIN:-example.com}
  - HOSTNAMES=${HOSTNAMES:-mail.example.com}
  - POSTMASTER=${POSTMASTER:-admin}
  - RECIPIENT_DELIMITER=${RECIPIENT_DELIMITER:-+}
  - DKIM_SELECTOR=${DKIM_SELECTOR:-dkim}
  - DKIM_PATH=${DKIM_PATH:-/dkim/{domain}.{selector}.key}
  - LOG_LEVEL=${LOG_LEVEL:-WARNING}
  - SUBNET=${SUBNET:-192.168.203.0/24}
  - TLS_FLAVOR=${TLS_FLAVOR:-notls}
  - WEB_ADMIN=${WEB_ADMIN:-/admin}
  - WEB_WEBMAIL=${WEB_WEBMAIL:-/webmail}
  - ADMIN=${ADMIN:-true}
  - WEBMAIL=${WEBMAIL:-roundcube}
  - SITENAME=${SITENAME:-Mailu}
  - WEBSITE=https://${MAIL_HOSTNAME:-mail.example.com}
  - AUTH_RATELIMIT_IP=${AUTH_RATELIMIT_IP:-60/hour}
  - AUTH_RATELIMIT_USER=${AUTH_RATELIMIT_USER:-100/day}
  - DISABLE_STATISTICS=${DISABLE_STATISTICS:-True}
  - DB_FLAVOR=${DB_FLAVOR:-sqlite}
  - MESSAGE_SIZE_LIMIT=${MESSAGE_SIZE_LIMIT:-50000000}
  - MESSAGE_RATELIMIT=${MESSAGE_RATELIMIT:-200/day}
  - ANTIVIRUS=${ANTIVIRUS:-none}
  - FETCHMAIL_DELAY=${FETCHMAIL_DELAY:-600}
  - RELAYNETS=${RELAYNETS:-}
  - RELAYHOST=${RELAYHOST:-}
  - RELAY_USER=${RELAY_USER:-}
  - RELAY_PASSWORD=${RELAY_PASSWORD:-}
  - FRONT_ADDRESS=front
  - ANTISPAM_ADDRESS=antispam
  - REAL_IP_HEADER=X-Forwarded-For
  - REAL_IP_FROM=172.0.0.0/8

x-mailu-dns: &mailu-dns
  - 192.168.203.254

services:

  # Reverse proxy (nginx)
  front:
    image: ghcr.io/mailu/nginx:2024.06
    restart: always
    environment: *mailu-env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailu-web.rule=Host(`${MAIL_HOSTNAME:-mail.example.com}`)"
      - "traefik.http.routers.mailu-web.entrypoints=websecure"
      - "traefik.http.routers.mailu-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.mailu-web.loadbalancer.server.port=80"
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "110:110"
      - "995:995"
      - "143:143"
      - "993:993"
    networks:
      - default
      - easypanel
    volumes:
      - certs:/certs
      - overrides_nginx:/overrides:ro
    depends_on:
      - resolver
    dns: *mailu-dns

  # DNS resolver (unbound)
  resolver:
    image: ghcr.io/mailu/unbound:2024.06
    restart: always
    environment: *mailu-env
    networks:
      default:
        ipv4_address: 192.168.203.254

  # Admin interface
  admin:
    image: ghcr.io/mailu/admin:2024.06
    restart: always
    environment: *mailu-env
    volumes:
      - data:/data
      - dkim:/dkim
    depends_on:
      - redis
      - resolver
    dns: *mailu-dns

  # IMAP server (Dovecot)
  imap:
    image: ghcr.io/mailu/dovecot:2024.06
    restart: always
    environment: *mailu-env
    volumes:
      - mail:/mail
      - overrides_dovecot:/overrides:ro
    depends_on:
      - front
      - resolver
    dns: *mailu-dns

  # SMTP server (Postfix)
  smtp:
    image: ghcr.io/mailu/postfix:2024.06
    restart: always
    environment: *mailu-env
    volumes:
      - mailqueue:/queue
      - overrides_postfix:/overrides:ro
    depends_on:
      - front
      - resolver
    dns: *mailu-dns

  # Anti-spam (Rspamd)
  antispam:
    image: ghcr.io/mailu/rspamd:2024.06
    restart: always
    environment: *mailu-env
    volumes:
      - filter:/var/lib/rspamd
      - overrides_rspamd:/overrides:ro
    depends_on:
      - front
      - redis
      - resolver
    dns: *mailu-dns

  # Webmail (Roundcube)
  webmail:
    image: ghcr.io/mailu/webmail:2024.06
    restart: always
    environment: *mailu-env
    volumes:
      - webmail:/data
      - overrides_roundcube:/overrides:ro
    depends_on:
      - front
      - resolver
    dns: *mailu-dns

  # Redis (session storage and rate limiting)
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis:/data

  # Fetchmail (fetch from external accounts)
  fetchmail:
    image: ghcr.io/mailu/fetchmail:2024.06
    restart: always
    environment: *mailu-env
    volumes:
      - data:/data
    depends_on:
      - admin
      - smtp
      - imap
      - resolver
    dns: *mailu-dns

  # Backup worker
  backup:
    build: ./worker
    restart: always
    environment:
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-02:00}
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION=${BACKUP_RETENTION:-30}
      - COMPOSE_PROJECT=${COMPOSE_PROJECT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_PREFIX=${S3_PREFIX:-mailu-backups}
      - S3_STORAGE_CLASS=${S3_STORAGE_CLASS:-STANDARD_IA}
      - S3_RETENTION_DAYS=${S3_RETENTION_DAYS:-90}
      - S3_REGION=${S3_REGION:-sa-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - RUN_ON_STARTUP=${RUN_ON_STARTUP:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - admin
      - redis

volumes:
  certs:
  data:
  dkim:
  mail:
  mailqueue:
  filter:
  webmail:
  redis:
  backups:
  overrides_nginx:
  overrides_dovecot:
  overrides_postfix:
  overrides_rspamd:
  overrides_roundcube:

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.203.0/24
  easypanel:
    external: true
