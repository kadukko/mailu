services:

  # Reverse proxy (nginx)
  front:
    image: ghcr.io/mailu/nginx:2024.06
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - HOSTNAMES=${HOSTNAMES}
      - POSTMASTER=${POSTMASTER:-admin}
      - RECIPIENT_DELIMITER=${RECIPIENT_DELIMITER:-+}
      - DKIM_SELECTOR=${DKIM_SELECTOR:-dkim}
      - DKIM_PATH=${DKIM_PATH:-/dkim/{domain}.{selector}.key}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - SUBNET=${SUBNET:-192.168.203.0/24}
      - BIND_ADDRESS4=0.0.0.0
      - BIND_ADDRESS6=::1
      - TLS_FLAVOR=${TLS_FLAVOR:-mail}
      - WEB_ADMIN=${WEB_ADMIN:-/admin}
      - WEB_WEBMAIL=${WEB_WEBMAIL:-/webmail}
      - ADMIN=${ADMIN:-true}
      - WEBMAIL=${WEBMAIL:-roundcube}
      - SITENAME=${SITENAME:-Mailu}
      - WEBSITE=${WEBSITE}
      - AUTH_RATELIMIT_IP=${AUTH_RATELIMIT_IP:-60/hour}
      - AUTH_RATELIMIT_USER=${AUTH_RATELIMIT_USER:-100/day}
      - DISABLE_STATISTICS=${DISABLE_STATISTICS:-True}
      - REAL_IP_HEADER=X-Forwarded-For
      - REAL_IP_FROM=172.0.0.0/8
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "110:110"
      - "995:995"
      - "143:143"
      - "993:993"
      - "80:80"
      - "443:443"
    networks:
      - default
    volumes:
      - certs:/certs
      - overrides_nginx:/overrides:ro
    depends_on:
      - resolver
    dns:
      - 192.168.203.254

  # DNS resolver (unbound)
  resolver:
    image: ghcr.io/mailu/unbound:2024.06
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
    networks:
      default:
        ipv4_address: 192.168.203.254

  # Admin interface
  admin:
    image: ghcr.io/mailu/admin:2024.06
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - HOSTNAMES=${HOSTNAMES}
      - POSTMASTER=${POSTMASTER:-admin}
      - RECIPIENT_DELIMITER=${RECIPIENT_DELIMITER:-+}
      - DKIM_SELECTOR=${DKIM_SELECTOR:-dkim}
      - DKIM_PATH=${DKIM_PATH:-/dkim/{domain}.{selector}.key}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - SUBNET=${SUBNET:-192.168.203.0/24}
      - TLS_FLAVOR=${TLS_FLAVOR:-mail}
      - WEB_ADMIN=${WEB_ADMIN:-/admin}
      - WEB_WEBMAIL=${WEB_WEBMAIL:-/webmail}
      - ADMIN=${ADMIN:-true}
      - WEBMAIL=${WEBMAIL:-roundcube}
      - SITENAME=${SITENAME:-Mailu}
      - WEBSITE=${WEBSITE}
      - AUTH_RATELIMIT_IP=${AUTH_RATELIMIT_IP:-60/hour}
      - AUTH_RATELIMIT_USER=${AUTH_RATELIMIT_USER:-100/day}
      - DISABLE_STATISTICS=${DISABLE_STATISTICS:-True}
      - DB_FLAVOR=${DB_FLAVOR:-sqlite}
    volumes:
      - data:/data
      - dkim:/dkim
    depends_on:
      - redis
      - resolver
    dns:
      - 192.168.203.254

  # IMAP server (Dovecot)
  imap:
    image: ghcr.io/mailu/dovecot:2024.06
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - HOSTNAMES=${HOSTNAMES}
      - POSTMASTER=${POSTMASTER:-admin}
      - RECIPIENT_DELIMITER=${RECIPIENT_DELIMITER:-+}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - SUBNET=${SUBNET:-192.168.203.0/24}
      - FRONT_ADDRESS=front
      - ANTISPAM_ADDRESS=antispam
    volumes:
      - mail:/mail
      - overrides_dovecot:/overrides:ro
    depends_on:
      - front
      - resolver
    dns:
      - 192.168.203.254

  # SMTP server (Postfix)
  smtp:
    image: ghcr.io/mailu/postfix:2024.06
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - HOSTNAMES=${HOSTNAMES}
      - POSTMASTER=${POSTMASTER:-admin}
      - RECIPIENT_DELIMITER=${RECIPIENT_DELIMITER:-+}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - SUBNET=${SUBNET:-192.168.203.0/24}
      - MESSAGE_SIZE_LIMIT=${MESSAGE_SIZE_LIMIT:-50000000}
      - MESSAGE_RATELIMIT=${MESSAGE_RATELIMIT:-200/day}
      - RELAYNETS=${RELAYNETS:-}
      - RELAYHOST=${RELAYHOST}
      - RELAY_USER=${RELAY_USER}
      - RELAY_PASSWORD=${RELAY_PASSWORD}
      - FRONT_ADDRESS=front
      - ANTISPAM_ADDRESS=antispam
    volumes:
      - mailqueue:/queue
      - overrides_postfix:/overrides:ro
    depends_on:
      - front
      - resolver
    dns:
      - 192.168.203.254

  # Anti-spam (Rspamd)
  antispam:
    image: ghcr.io/mailu/rspamd:2024.06
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - HOSTNAMES=${HOSTNAMES}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - SUBNET=${SUBNET:-192.168.203.0/24}
      - ANTIVIRUS=${ANTIVIRUS:-none}
    volumes:
      - filter:/var/lib/rspamd
      - overrides_rspamd:/overrides:ro
    depends_on:
      - front
      - redis
      - resolver
    dns:
      - 192.168.203.254

  # Webmail (Roundcube)
  webmail:
    image: ghcr.io/mailu/webmail:2024.06
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - HOSTNAMES=${HOSTNAMES}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - SUBNET=${SUBNET:-192.168.203.0/24}
      - WEB_WEBMAIL=${WEB_WEBMAIL:-/webmail}
      - WEBMAIL=${WEBMAIL:-roundcube}
      - FRONT_ADDRESS=front
    volumes:
      - webmail:/data
      - overrides_roundcube:/overrides:ro
    depends_on:
      - front
      - resolver
    dns:
      - 192.168.203.254

  # Redis (session storage and rate limiting)
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis:/data

  # Fetchmail (fetch from external accounts)
  fetchmail:
    image: ghcr.io/mailu/fetchmail:2024.06
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - HOSTNAMES=${HOSTNAMES}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - FETCHMAIL_DELAY=${FETCHMAIL_DELAY:-600}
    volumes:
      - data:/data
    depends_on:
      - admin
      - smtp
      - imap
      - resolver
    dns:
      - 192.168.203.254

volumes:
  certs:
  data:
  dkim:
  mail:
  mailqueue:
  filter:
  webmail:
  redis:
  overrides_nginx:
  overrides_dovecot:
  overrides_postfix:
  overrides_rspamd:
  overrides_roundcube:

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.203.0/24
