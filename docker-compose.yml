x-mailu-env: &mailu-env
  - SECRET_KEY=${SECRET_KEY}
  - DOMAIN=${DOMAIN}
  - HOSTNAMES=${HOSTNAMES}
  - POSTMASTER=${POSTMASTER}
  - RECIPIENT_DELIMITER=${RECIPIENT_DELIMITER}
  - DKIM_SELECTOR=${DKIM_SELECTOR}
  - DKIM_PATH=${DKIM_PATH}
  - LOG_LEVEL=${LOG_LEVEL}
  - SUBNET=${SUBNET}
  - TLS_FLAVOR=${TLS_FLAVOR}
  - WEB_ADMIN=${WEB_ADMIN}
  - WEB_WEBMAIL=${WEB_WEBMAIL}
  - ADMIN=${ADMIN}
  - WEBMAIL=${WEBMAIL}
  - SITENAME=${SITENAME}
  - WEBSITE=https://${MAIL_HOSTNAME}
  - AUTH_RATELIMIT_IP=${AUTH_RATELIMIT_IP}
  - AUTH_RATELIMIT_USER=${AUTH_RATELIMIT_USER}
  - DISABLE_STATISTICS=${DISABLE_STATISTICS}
  - DB_FLAVOR=postgresql
  - DB_HOST=database
  - DB_PORT=5432
  - DB_NAME=${DB_NAME}
  - DB_USER=${DB_USER}
  - DB_PW=${DB_PW}
  - MESSAGE_SIZE_LIMIT=${MESSAGE_SIZE_LIMIT}
  - MESSAGE_RATELIMIT=${MESSAGE_RATELIMIT}
  - ANTIVIRUS=${ANTIVIRUS}
  - FETCHMAIL_DELAY=${FETCHMAIL_DELAY}
  - RELAYNETS=${RELAYNETS}
  - RELAYHOST=${RELAYHOST}
  - RELAY_USER=${RELAY_USER}
  - RELAY_PASSWORD=${RELAY_PASSWORD}
  - FRONT_ADDRESS=front
  - ANTISPAM_ADDRESS=antispam
  - REAL_IP_HEADER=X-Forwarded-For
  - REAL_IP_FROM=172.0.0.0/8
  - BACKUP_SCHEDULE=${BACKUP_SCHEDULE}
  - BACKUP_DIR=/backups
  - BACKUP_RETENTION=${BACKUP_RETENTION}
  - RUN_ON_STARTUP=${RUN_ON_STARTUP}

x-mailu-dns: &mailu-dns
  - 192.168.203.254

services:

  # Reverse proxy (nginx)
  front:
    image: ghcr.io/mailu/nginx:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailu-web.rule=Host(`${MAIL_HOSTNAME}`)"
      - "traefik.http.routers.mailu-web.entrypoints=websecure"
      - "traefik.http.routers.mailu-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.mailu-web.loadbalancer.server.port=80"
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "110:110"
      - "995:995"
      - "143:143"
      - "993:993"
    networks:
      - default
      - easypanel
    volumes:
      - certs:/certs
      - overrides_nginx:/overrides:ro
    depends_on:
      - resolver
    dns: *mailu-dns

  # DNS resolver (unbound)
  resolver:
    image: ghcr.io/mailu/unbound:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    networks:
      default:
        ipv4_address: 192.168.203.254

  # PostgreSQL database
  database:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PW}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default

  # Admin interface
  admin:
    image: ghcr.io/mailu/admin:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    volumes:
      - data:/data
      - dkim:/dkim
    depends_on:
      - database
      - redis
      - resolver
    dns: *mailu-dns

  # IMAP server (Dovecot)
  imap:
    image: ghcr.io/mailu/dovecot:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    volumes:
      - mail:/mail
      - overrides_dovecot:/overrides:ro
    depends_on:
      - front
      - resolver
    dns: *mailu-dns

  # SMTP server (Postfix)
  smtp:
    image: ghcr.io/mailu/postfix:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    volumes:
      - mailqueue:/queue
      - overrides_postfix:/overrides:ro
    depends_on:
      - front
      - resolver
    dns: *mailu-dns

  # Anti-spam (Rspamd)
  antispam:
    image: ghcr.io/mailu/rspamd:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    volumes:
      - filter:/var/lib/rspamd
      - overrides_rspamd:/overrides:ro
    depends_on:
      - front
      - redis
      - resolver
    dns: *mailu-dns

  # Webmail (Roundcube)
  webmail:
    image: ghcr.io/mailu/webmail:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    volumes:
      - webmail:/data
      - overrides_roundcube:/overrides:ro
    depends_on:
      - front
      - resolver
    dns: *mailu-dns

  # Redis (session storage and rate limiting)
  redis:
    image: redis:7-alpine
    restart: always
    env_file: .env
    volumes:
      - redis:/data

  # Fetchmail (fetch from external accounts)
  fetchmail:
    image: ghcr.io/mailu/fetchmail:2024.06
    restart: always
    env_file: .env
    environment: *mailu-env
    volumes:
      - data:/data
    depends_on:
      - admin
      - smtp
      - imap
      - resolver
    dns: *mailu-dns

  # Backup worker
  backup:
    build: ./worker
    restart: always
    env_file: .env
    environment: *mailu-env
    volumes:
      - backups:/backups
      - mail:/sources/mail
      - data:/sources/data
      - dkim:/sources/dkim
      - certs:/sources/certs
      - webmail:/sources/webmail
      - filter:/sources/filter
      - redis:/sources/redis
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - database
      - admin
      - redis

volumes:
  certs:
  data:
  dkim:
  pgdata:
  mail:
  mailqueue:
  filter:
  webmail:
  redis:
  backups:
  overrides_nginx:
  overrides_dovecot:
  overrides_postfix:
  overrides_rspamd:
  overrides_roundcube:

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.203.0/24
  easypanel:
    external: true
